# Dovecot configuration for km0-mail (PostgreSQL virtual users, Maildir, LMTP, IMAPS)

protocols = imap lmtp

listen = *,[::]

mail_uid = vmail
mail_gid = vmail
first_valid_uid = 5000
last_valid_uid = 5000

mail_location = maildir:/var/mail/vhosts/%d/%n
namespace inbox {
  inbox = yes
  location =
  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
}

auth_mechanisms = plain login

passdb {
  driver = sql
  args = /run/dovecot/dovecot-sql.conf.ext
}

userdb {
  driver = sql
  args = /run/dovecot/dovecot-sql.conf.ext
}

service auth {
  inet_listener {
    port = 12345
  }
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
  }
}

service lmtp {
  inet_listener lmtp {
    port = 24
  }
}

service imap-login {
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

ssl = required
ssl_cert = </run/dovecot/ssl/dovecot.pem
ssl_key = </run/dovecot/ssl/dovecot.key
ssl_min_protocol = TLSv1.2
