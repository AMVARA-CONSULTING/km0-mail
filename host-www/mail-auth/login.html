<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="pageTitle">Kilómetro 0 Digital — KM0 Mail</title>
  <meta name="description" content="Acceso al correo web — Kilómetro 0 Digital" data-i18n-meta-desc />
  <link rel="canonical" href="https://mail.km0digital.com/login.html" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0b1220;
      --gradient: linear-gradient(135deg, #ff5f2e 0%, #e040a0 35%, #7b3fe4 65%, #007bff 100%);
      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--navy);
      background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(123, 63, 228, 0.18) 0%, transparent 70%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      position: relative;
      width: min(440px, 92vw);
      padding: 2.5rem 2rem 2rem;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    .km0-lang-switch {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 2px;
      padding: 3px;
      border-radius: 9999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.75rem;
      font-weight: 500;
    }
    .km0-lang-switch__btn {
      border: 0;
      border-radius: 9999px;
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font: inherit;
      padding: 6px 10px;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .km0-lang-switch__btn:hover { color: #fff; }
    .km0-lang-switch__btn--active {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .logo {
      width: min(192px, 44vw);
      height: auto;
      margin: 0 auto 1.5rem;
      display: block;
      filter: drop-shadow(0 0 24px rgba(123, 63, 228, 0.35));
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      margin: 0 0 0.75rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .tagline {
      margin: 0 0 1.75rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }
    .intro {
      margin: 0 0 1.25rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .theme-form-row { margin: 14px auto; max-width: 320px; }
    .dex-btn {
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      padding: 0;
      width: 100%;
    }
    .theme-btn-provider {
      background: #ffffff;
      border: 1px solid rgba(11, 18, 32, 0.08);
      border-radius: 9999px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      color: #0b1220;
      min-height: 44px;
      transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
    }
    .theme-btn-provider:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      transform: scale(1.02);
    }
    .dex-btn-icon {
      background-position: center;
      background-repeat: no-repeat;
      background-size: 24px;
      border-radius: 9999px 0 0 9999px;
      flex-shrink: 0;
      height: 44px;
      margin-right: 8px;
      width: 44px;
    }
    .dex-btn-icon--google {
      background-color: #ffffff;
      background-image: url(/dex/static/img/google-icon.svg);
    }
    .dex-btn-text {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 500;
      padding-right: 12px;
      text-align: center;
    }
    .landing-divider {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      margin: 1.25rem 0 0.75rem;
      text-transform: uppercase;
    }
    .btn-local, .btn-legacy {
      align-items: center;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 9999px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      justify-content: center;
      margin: 0 auto;
      max-width: 320px;
      padding: 0.85rem 2rem;
      text-decoration: none;
      transition: background 0.35s var(--ease);
      width: 100%;
    }
    .btn-local:hover, .btn-legacy:hover { background: rgba(255, 255, 255, 0.06); }
    .register-link {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
    }
    .register-link:hover { color: #7b3fe4; }
    footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.35);
    }
    footer a { color: rgba(255, 255, 255, 0.55); text-decoration: none; }
    footer a:hover { color: #7b3fe4; }
    .success-banner {
      display: none;
      margin: 0 0 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: rgba(56, 178, 72, 0.15);
      border: 1px solid rgba(56, 178, 72, 0.35);
      color: #9ae6b4;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .success-banner--visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <nav class="km0-lang-switch" role="navigation" aria-label="Idioma">
      <button type="button" class="km0-lang-switch__btn" data-lang="ca" aria-pressed="false">CA</button>
      <button type="button" class="km0-lang-switch__btn km0-lang-switch__btn--active" data-lang="es" aria-pressed="true">ES</button>
      <button type="button" class="km0-lang-switch__btn" data-lang="en" aria-pressed="false">EN</button>
      <button type="button" class="km0-lang-switch__btn" data-lang="de" aria-pressed="false">DE</button>
    </nav>
    <img class="logo" src="/logo.svg" alt="Kilómetro 0 Digital" width="192" height="192" />
    <p class="eyebrow" data-i18n="loginEyebrow">Kilómetro 0 Digital</p>
    <h1>KM0 Mail</h1>
    <p class="tagline" data-i18n="landingTagline">Origen local · Impacto digital</p>
    <p class="intro">Inicia sesión con Google o tu usuario @km0digital.com.</p>

    <div class="success-banner" id="km0-registered-banner" data-i18n="registerSuccessBanner" role="status"></div>

    <div class="theme-form-row">
      <button type="button" class="dex-btn theme-btn-provider" id="km0-login-google">
        <span class="dex-btn-icon dex-btn-icon--google" aria-hidden="true"></span>
        <span class="dex-btn-text" data-i18n-connector="google">Continuar con Google</span>
      </button>
    </div>

    <p class="landing-divider" data-i18n="landingDividerOr">o</p>

    <button type="button" class="btn-local" id="km0-local-login" data-i18n="landingCtaLocal">
      Iniciar sesión con usuario y contraseña
    </button>

    <a class="btn-legacy" href="/index.php?_task=login" style="margin-top:0.75rem;">Acceso operativo (contraseña de buzón)</a>

    <a class="register-link" href="/register" data-i18n="registerCreateAccountLink">¿Aún no tienes cuenta?</a>

    <footer>
      <a href="https://km0digital.com/" target="_blank" rel="noopener">km0digital.com</a>
    </footer>
  </div>
  <script src="/dex/theme/i18n.js"></script>
  <script src="/dex-auth.js"></script>
  <script>
    (function () {
      'use strict';
      document.getElementById('km0-login-google').addEventListener('click', function () {
        window.KM0DexAuth.startDexLogin('google');
      });
      document.getElementById('km0-local-login').addEventListener('click', function () {
        window.KM0DexAuth.startDexLogin('ldap');
      });
      try {
        if (new URLSearchParams(location.search).get('registered') === '1') {
          document.getElementById('km0-registered-banner').classList.add('success-banner--visible');
        }
      } catch (_) {}
    })();
  </script>
</body>
</html>
