<roundcube:include file="includes/layout.html" />

<h1 class="voice"><roundcube:object name="productname" /> <roundcube:label name="login" /></h1>

<div id="layout-content" class="selected no-navbar km0-login-card" role="main">
	<nav class="km0-lang-switch" role="navigation" aria-label="Idioma">
		<button type="button" class="km0-lang-switch__btn" data-lang="ca" aria-pressed="false">CA</button>
		<button type="button" class="km0-lang-switch__btn" data-lang="es" aria-pressed="false">ES</button>
		<button type="button" class="km0-lang-switch__btn km0-lang-switch__btn--active" data-lang="en" aria-pressed="true">EN</button>
		<button type="button" class="km0-lang-switch__btn" data-lang="de" aria-pressed="false">DE</button>
	</nav>
	<div class="km0-login-brand">
		<roundcube:object name="logo" src="/images/logo.svg" id="logo" alt="Kilometer 0 Digital" />
		<p class="km0-login-eyebrow" data-i18n="loginEyebrow">Kilometer 0 Digital</p>
		<h2 class="km0-login-title"><roundcube:object name="productname" /></h2>
		<p class="km0-login-tagline" data-i18n="loginTagline">Local origin · Digital impact</p>
	</div>
	<roundcube:form id="login-form" name="login-form" method="post" class="propform km0-login-form">
	<roundcube:object name="loginform" form="login-form" size="40" submit=true class="form-control" />
		<div id="login-footer" role="contentinfo">
			<roundcube:object name="productname" condition="config:display_product_info &gt; 0" />
			<roundcube:object name="version" condition="config:display_product_info == 2" />
			<roundcube:if condition="config:support_url" />
				&nbsp;&bull;&nbsp; <a href="<roundcube:var name='config:support_url' />" target="_blank" rel="noopener" class="support-link"><roundcube:label name="support" /></a>
			<roundcube:endif />
			<roundcube:container name="loginfooter" id="login-footer" />
		</div>
	</form>
</div>

<noscript>
	<p class="noscriptwarning"><roundcube:label name="noscriptwarning" /></p>
</noscript>

<script src="/skins/km0/js/i18n.js"></script>

<roundcube:include file="includes/footer.html" />
